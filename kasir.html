<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS Kasir Barcode - Jalur Bebas</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 min-h-screen flex flex-col">

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx9GXJBNZhXVgN5HalK9tsQw_b4DKf-1ANFWGPwJu2VslbUiAtFkNVCMg7is0YyuXHR/exec";
  </script>

  <header class="bg-indigo-600 text-white shadow-md p-4">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold flex items-center gap-2"><i class="fa-solid fa-cash-register"></i> POS Kasir Barcode</h1>
      <div class="bg-indigo-700 px-4 py-2 rounded-lg font-mono text-sm shadow-inner" id="display-trx-id">Menghubungkan ke Sheets...</div>
    </div>
  </header>

  <main class="container mx-auto flex-grow p-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
    <section class="lg:col-span-5 flex flex-col gap-4">
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
        <h2 class="text-md font-semibold text-slate-700 mb-3 flex items-center justify-between">
          <span><i class="fa-solid fa-camera text-indigo-500 mr-2"></i>Kamera Barcode Scanner</span>
          <button onclick="toggleScanner()" id="btn-toggle-scan" class="bg-indigo-600 text-white text-xs px-3 py-1.5 rounded-lg hover:bg-indigo-700 cursor-pointer">Aktifkan Kamera</button>
        </h2>
        <div id="reader" class="w-full bg-slate-900 rounded-lg overflow-hidden border border-slate-300 min-h-[200px] flex items-center justify-center text-slate-500 text-sm italic">Kamera dinonaktifkan</div>
      </div>

      <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col justify-between">
        <div>
          <h2 class="text-lg font-semibold text-slate-700 border-b pb-3 mb-4"><i class="fa-solid fa-box-open text-indigo-500 mr-2"></i>Detail Produk</h2>
          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-600 mb-1">Pilih / Ketik / Scan Produk</label>
            <input type="text" id="select-produk" list="daftar-produk-datalist" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition" placeholder="Ketik nama atau kode barcode barang..." oninput="updateDetailProdukPilihan()">
              <datalist id="daftar-produk-datalist"></datalist>
          </div>
          <div class="grid grid-cols-2 gap-4 mb-4 text-sm">
            <div class="p-3 bg-indigo-50 rounded-lg text-indigo-700"><span class="block text-xs text-indigo-500">Harga Satuan</span><span class="text-base font-bold" id="info-harga">Rp 0</span></div>
            <div class="p-3 bg-emerald-50 rounded-lg text-emerald-700"><span class="block text-xs text-emerald-500">Stok Tersedia</span><span class="text-base font-bold" id="info-stok">0</span></div>
          </div>
          <div class="mb-6">
            <label class="block text-sm font-medium text-slate-600 mb-1">Jumlah Beli (Qty)</label>
            <input type="number" id="input-qty" value="1" min="1" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-center font-semibold">
          </div>
        </div>
        <button onclick="tambahKeKeranjang()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg cursor-pointer">Tambah ke Keranjang</button>
      </div>
    </section>

    <section class="lg:col-span-7 flex flex-col gap-6">
      <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex-grow">
        <h2 class="text-lg font-semibold text-slate-700 border-b pb-3 mb-4"><i class="fa-solid fa-shopping-cart text-indigo-500 mr-2"></i>Keranjang Belanja</h2>
        <div class="overflow-x-auto max-h-60">
          <table class="w-full text-left text-sm">
            <thead class="bg-slate-50 text-slate-600 uppercase text-xs">
              <tr><th class="p-3">Nama</th><th class="p-3 text-center">Qty</th><th class="p-3 text-right">Harga</th><th class="p-3 text-right">Subtotal</th><th class="p-3 text-center">Aksi</th></tr>
            </thead>
            <tbody id="tabel-keranjang" class="divide-y divide-slate-100">
              <tr><td colspan="5" class="p-8 text-center text-slate-400 italic">Keranjang masih kosong</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
        <div class="bg-slate-900 text-emerald-400 p-6 rounded-xl text-right mb-6"><span class="block text-xs text-slate-400">Total Belanja</span><span class="text-3xl font-mono font-bold" id="display-total">Rp 0</span></div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-600 mb-1">Metode Pembayaran</label>
            <select id="select-metode" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg"><option value="Cash">Cash</option><option value="QRIS">QRIS</option><option value="Transfer">Transfer</option></select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-600 mb-1">Uang Dibayar (Rp)</label>
            <input type="number" id="input-bayar" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-right font-bold text-lg text-emerald-600" oninput="hitungKembalian()">
          </div>
        </div>
        <div class="mt-4 p-4 bg-slate-50 rounded-lg flex justify-between items-center"><span class="text-sm">Uang Kembalian:</span><span class="text-xl font-mono font-bold" id="display-kembalian">Rp 0</span></div>
        <button onclick="prosesSelesaiTransaksi()" class="w-full mt-6 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg shadow-md cursor-pointer">Selesai & Simpan Transaksi</button>
      </div>
    </section>
  </main>

  <div id="modal-status" class="fixed inset-0 bg-slate-950/50 backdrop-blur-sm hidden items-center justify-center z-50">
    <div class="bg-white p-6 rounded-xl max-w-sm w-full mx-4 text-center">
      <div id="modal-icon" class="text-4xl mb-3"><i class="fa-solid fa-circle-notch animate-spin text-indigo-600"></i></div>
      <h3 id="modal-title" class="text-lg font-bold mb-1">Memproses...</h3>
      <p id="modal-message" class="text-sm text-slate-500 mb-4">Mohon tunggu.</p>
      <button id="modal-btn-close" onclick="tutupModal()" class="hidden w-full bg-slate-800 text-white py-2 rounded-lg">OK</button>
    </div>
  </div>

  <script>
    let daftarProdukMaster = [];
    let keranjangBelanja = [];
    let currentTrxId = "";
    let currentTotalBelanja = 0;
    let html5QrcodeScanner = null;
    let isScanning = false;

    document.addEventListener("DOMContentLoaded", function() { muatDataAwal(); });

    function muatDataAwal() {
      showLoadingModal("Sinkronisasi", "Menghubungkan ke database Google Sheets...");
      fetch(`${API_URL}?action=getTrxId`)
        .then(res => res.json())
        .then(res => {
          currentTrxId = res.trxId;
          document.getElementById("display-trx-id").innerText = res.trxId;
          return fetch(`${API_URL}?action=getProduk`);
        })
        .then(res => res.json())
        .then(data => {
          daftarProdukMaster = data;
          isiDropdownProduk(data);
          tutupModal();
        })
        .catch(err => { showErrorModal("Error Koneksi", "Gagal mengambil data dari Google Sheets."); });
    }

    function isiDropdownProduk(list) {
  const datalist = document.getElementById("daftar-produk-datalist");
  datalist.innerHTML = ''; // Bersihkan data lama
  
  list.forEach(p => {
    if(p.stok > 0) {
      let opt = document.createElement("option");
      // value diisi ID agar saat dipilih, kode barcode/ID yang masuk ke kolom input
      opt.value = p.id; 
      // Keterangan di bawahnya akan memunculkan nama barang saat kasir mengetik
      opt.innerText = `${p.nama} (Stok: ${p.stok})`;
      datalist.appendChild(opt);
    }
  });
}

    function toggleScanner() {
      const btn = document.getElementById("btn-toggle-scan");
      if (isScanning) {
        html5QrcodeScanner.stop().then(() => {
          document.getElementById("reader").innerHTML = "Kamera dinonaktifkan";
          btn.innerText = "Aktifkan Kamera";
          isScanning = false;
        });
      } else {
        document.getElementById("reader").innerHTML = "";
        btn.innerText = "Matikan Kamera";
        isScanning = true;
        html5QrcodeScanner = new Html5Qrcode("reader");
        html5QrcodeScanner.start(
          { facingMode: "environment" }, 
          { fps: 15, qrbox: (w, h) => ({ width: w*0.8, height: h*0.5 }) },
          (text) => {
            if (navigator.vibrate) navigator.vibrate(100);
            const prod = daftarProdukMaster.find(p => p.id === text.trim());
            if (prod) {
              document.getElementById("select-produk").value = prod.id;
              updateDetailProdukPilihan();
              tambahKeKeranjang();
            } else { alert("Barcode '" + text + "' tidak ditemukan!"); }
          }
        ).catch(() => { alert("Izin kamera ditolak browser."); toggleScanner(); });
      }
    }

    function updateDetailProdukPilihan() {
      const id = document.getElementById("select-produk").value;
      const p = daftarProdukMaster.find(prod => prod.id === id);
      document.getElementById("info-harga").innerText = p ? formatRupiah(p.harga) : "Rp 0";
      document.getElementById("info-stok").innerText = p ? p.stok : "0";
    }

    function tambahKeKeranjang() {
      const id = document.getElementById("select-produk").value;
      if(!id) return;
      const p = daftarProdukMaster.find(prod => prod.id === id);
      const qty = parseInt(document.getElementById("input-qty").value) || 1;
      if(qty > p.stok) { alert("Stok tidak cukup!"); return; }
      
      let exist = keranjangBelanja.find(item => item.id === id);
      if(exist) {
        if(exist.qty + qty > p.stok) { alert("Total keranjang melebihi stok!"); return; }
        exist.qty += qty; exist.subtotal = exist.qty * exist.harga;
      } else {
        keranjangBelanja.push({ id: p.id, nama: p.nama, harga: p.harga, qty: qty, subtotal: qty * p.harga });
      }
      renderKeranjang();
    }

    function renderKeranjang() {
      const tbody = document.getElementById("tabel-keranjang");
      tbody.innerHTML = keranjangBelanja.length === 0 ? '<tr><td colspan="5" class="p-8 text-center text-slate-400 italic">Keranjang kosong</td></tr>' : '';
      currentTotalBelanja = 0;
      keranjangBelanja.forEach(item => {
        currentTotalBelanja += item.subtotal;
        let tr = document.createElement("tr");
        tr.innerHTML = `<td class="p-3">${item.nama}</td><td class="p-3 text-center">${item.qty}</td><td class="p-3 text-right">${formatRupiah(item.harga)}</td><td class="p-3 text-right font-bold">${formatRupiah(item.subtotal)}</td><td class="p-3 text-center"><button onclick="hapus('${item.id}')" class="text-rose-500"><i class="fa-solid fa-trash"></i></button></td>`;
        tbody.appendChild(tr);
      });
      document.getElementById("display-total").innerText = formatRupiah(currentTotalBelanja);
      hitungKembalian();
    }

    function hapus(id) { keranjangBelanja = keranjangBelanja.filter(i => i.id !== id); renderKeranjang(); }

    function hitungKembalian() {
      let bayar = parseFloat(document.getElementById("input-bayar").value) || 0;
      let lbl = document.getElementById("display-kembalian");
      let sel = document.getElementById("select-metode").value;
      if(sel !== "Cash") { document.getElementById("input-bayar").value = currentTotalBelanja; lbl.innerText = "Rp 0"; return; }
      let sisa = bayar - currentTotalBelanja;
      lbl.innerText = sisa < 0 ? "Kurang " + formatRupiah(Math.abs(sisa)) : formatRupiah(sisa);
      lbl.className = sisa < 0 ? "text-xl font-mono font-bold text-rose-500" : "text-xl font-mono font-bold text-emerald-600";
    }

    document.getElementById("select-metode").addEventListener("change", hitungKembalian);

    function prosesSelesaiTransaksi() {
      if(keranjangBelanja.length === 0) return;
      let bayar = parseFloat(document.getElementById("input-bayar").value) || 0;
      let metode = document.getElementById("select-metode").value;
      if(metode === "Cash" && bayar < currentTotalBelanja) { alert("Uang kurang!"); return; }

      let payload = { idTransaksi: currentTrxId, totalBelanja: currentTotalBelanja, metodePembayaran: metode, uangBayar: bayar, uangKembalian: metode==="Cash" ? bayar - currentTotalBelanja : 0, cart: keranjangBelanja };
      showLoadingModal("Menyimpan", "Mengirim data ke Google Sheets...");

      fetch(API_URL, { method: "POST", body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(res => {
          if(res.success) {
            showSuccessModal("Berhasil!", res.message);
            keranjangBelanja = []; document.getElementById("input-bayar").value = "";
            muatDataAwal();
          } else { showErrorModal("Gagal", res.message); }
        }).catch(() => showErrorModal("Error", "Gagal mengirim data."));
    }

    function formatRupiah(n) { return "Rp " + Number(n).toLocaleString('id-ID'); }
    function showLoadingModal(t, m) { document.getElementById("modal-title").innerText = t; document.getElementById("modal-message").innerText = m; document.getElementById("modal-btn-close").classList.add("hidden"); document.getElementById("modal-status").style.display = "flex"; }
    function showSuccessModal(t, m) { document.getElementById("modal-icon").innerHTML = '<i class="fa-solid fa-circle-check text-emerald-500"></i>'; document.getElementById("modal-title").innerText = t; document.getElementById("modal-message").innerText = m; document.getElementById("modal-btn-close").classList.remove("hidden"); document.getElementById("modal-status").style.display = "flex"; }
    function showErrorModal(t, m) { document.getElementById("modal-icon").innerHTML = '<i class="fa-solid fa-circle-xmark text-rose-500"></i>'; document.getElementById("modal-title").innerText = t; document.getElementById("modal-message").innerText = m; document.getElementById("modal-btn-close").classList.remove("hidden"); document.getElementById("modal-status").style.display = "flex"; }
    function tutupModal() { document.getElementById("modal-status").style.display = "none"; }
  </script>
</body>
</html>
